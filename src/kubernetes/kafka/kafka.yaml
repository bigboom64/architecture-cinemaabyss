apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: cinemaabyss
  labels:
    app: kafka
spec:
  clusterIP: None   # headless service для StatefulSet
  ports:
    - port: 9092
      name: broker
    - port: 9093
      name: controller
  selector:
    app: kafka
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-data
  namespace: cinemaabyss
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: cinemaabyss
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: apache/kafka:4.0.1-rc2
        ports:
          - containerPort: 9092
            name: broker
          - containerPort: 9093
            name: controller
        env:
          # Новые обязательные параметры KRaft
          - name: KAFKA_PROCESS_ROLES
            value: "broker,controller"
          - name: KAFKA_NODE_ID
            value: "1"
          - name: KAFKA_CONTROLLER_QUORUM_VOTERS
            value: "1@kafka-0.kafka.cinemaabyss.svc.cluster.local:9093"
          
          # Слушатели
          - name: KAFKA_LISTENERS
            value: PLAINTEXT://:9092,CONTROLLER://:9093
          - name: KAFKA_ADVERTISED_LISTENERS
            value: PLAINTEXT://kafka.cinemaabyss.svc.cluster.local:9092
          - name: KAFKA_INTER_BROKER_LISTENER_NAME
            value: PLAINTEXT

          # Директория с логами
          - name: KAFKA_LOG_DIRS
            value: /var/lib/kafka/data

          # Автосоздание топиков
          - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
            value: "true"
        volumeMounts:
          - name: kafka-data
            mountPath: /var/lib/kafka/data
        readinessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 60
          periodSeconds: 20
      volumes:
      - name: kafka-data
        persistentVolumeClaim:
          claimName: kafka-data
