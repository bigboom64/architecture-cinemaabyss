version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14
    container_name: cinemaabyss-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: cinemaabyss
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cinemaabyss-network

  # Kafka (KRaft mode, без Zookeeper)
  kafka:
    image: apache/kafka:4.0.1-rc2
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      # роли
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      # ID узла
      KAFKA_CFG_NODE_ID: 1
      # список контроллеров (для одного узла)
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # листенеры
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # директория логов
      KAFKA_CFG_LOG_DIRS: /bitnami/kafka/data
      # автоматическое создание топиков
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - cinemaabyss-network

  # Monolith Service
  monolith:
    build:
      context: ./src/monolith
      dockerfile: Dockerfile
    container_name: cinemaabyss-monolith
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_CONNECTION_STRING: postgres://postgres:postgres_password@postgres:5432/cinemaabyss?sslmode=disable
    networks:
      - cinemaabyss-network

  # Movies Microservice
  movies-service:
    build:
      context: ./src/microservices/movies
      dockerfile: Dockerfile
    container_name: cinemaabyss-movies-service
    depends_on:
      - postgres
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      DB_CONNECTION_STRING: postgres://postgres:postgres_password@postgres:5432/cinemaabyss?sslmode=disable
    networks:
      - cinemaabyss-network

  # Events Microservice
  events-service:
    build:
      context: ./src/microservices/events
      dockerfile: Dockerfile
    container_name: cinemaabyss-events-service
    depends_on:
      - kafka
    ports:
      - "3001:3001"
    environment:
      KAFKA_BROKERS: kafka:9092
      PORT: 3001
    networks:
      - cinemaabyss-network

  # Proxy Service
  proxy-service:
    build:
      context: ./src/microservices/proxy
      dockerfile: Dockerfile
    container_name: cinemaabyss-proxy-service
    depends_on:
      - monolith
      - movies-service
      - events-service
    ports:
      - "8000:3000"
    environment:
      PORT: 3000
      MONOLITH_HOST: monolith:8080
      MOVIE_MICROSERVICE_HOST: movies-service:8081
      EVENTS_MICROSERVICE_HOST: events-service:3001
      MOVIE_CUTOVER_PERCENT: "0.0"
    networks:
      - cinemaabyss-network

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cinemaabyss-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cinemaabyss
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - cinemaabyss-network

volumes:
  postgres-data:
  kafka-data:

networks:
  cinemaabyss-network:
    name: cinemaabyss-network
    driver: bridge
